version: '3.8'

services:
  iex-postgres:
    image: postgres:16
    container_name: iex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: iex_dashboard
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d iex_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 5

  iex-migrator:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: iex-migrator
    depends_on:
      iex-postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - PRISMA_HIDE_UPDATE_MESSAGE=true
      - TZ=Asia/Kolkata
      - DATABASE_URL=postgresql://postgres:postgres@iex-postgres:5432/iex_dashboard?schema=public
    command: sh -c "npx prisma db push && npx prisma db seed"

  iex-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iex-backend
    restart: unless-stopped
    ports:
      - "5001:5000"
    depends_on:
      iex-postgres:
        condition: service_healthy
      iex-migrator:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      - TZ=Asia/Kolkata
      - DATABASE_URL=postgresql://postgres:postgres@iex-postgres:5432/iex_dashboard?schema=public
    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres_data:
    name: postgres_data
